<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300" role="img" aria-label="Adaptive analytical RAG architecture">
  <defs>
    <style>
      .bg { fill: #f7f4ec; }
      .box { fill: #fffdf7; stroke: #2f3e46; stroke-width: 2; rx: 14; ry: 14; }
      .accent { fill: #d8e2dc; stroke: #2f3e46; stroke-width: 2; rx: 14; ry: 14; }
      .text { font: 16px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #1f2a30; }
      .small { font: 14px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #1f2a30; }
      .title { font: 700 24px 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #1f2a30; }
      .arrow { stroke: #2f3e46; stroke-width: 3; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f3e46"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="300" />
  <text class="title" x="40" y="44">Adaptive Analytical RAG</text>

  <rect class="box" x="40" y="80" width="150" height="70" />
  <text class="text" x="115" y="120" text-anchor="middle">Question</text>

  <rect class="accent" x="230" y="80" width="185" height="70" />
  <text class="text" x="322" y="111" text-anchor="middle">LLM Structured Planner</text>
  <text class="small" x="322" y="132" text-anchor="middle">intent + filters + evidence needs</text>

  <rect class="box" x="455" y="50" width="210" height="70" />
  <text class="text" x="560" y="81" text-anchor="middle">pandas Analytics</text>
  <text class="small" x="560" y="102" text-anchor="middle">facts, rankings, comparisons</text>

  <rect class="box" x="455" y="150" width="210" height="70" />
  <text class="text" x="560" y="181" text-anchor="middle">Chroma Retrieval</text>
  <text class="small" x="560" y="202" text-anchor="middle">metadata-filtered evidence</text>

  <rect class="accent" x="705" y="80" width="215" height="70" />
  <text class="text" x="812" y="111" text-anchor="middle">Grounded Answer Model</text>
  <text class="small" x="812" y="132" text-anchor="middle">metrics + excerpts only</text>

  <rect class="box" x="755" y="205" width="115" height="50" />
  <text class="small" x="812" y="236" text-anchor="middle">LLM Judge</text>

  <line class="arrow" x1="190" y1="115" x2="230" y2="115" />
  <line class="arrow" x1="415" y1="100" x2="455" y2="85" />
  <line class="arrow" x1="415" y1="130" x2="455" y2="185" />
  <line class="arrow" x1="665" y1="85" x2="705" y2="105" />
  <line class="arrow" x1="665" y1="185" x2="705" y2="125" />
  <line class="arrow" x1="812" y1="150" x2="812" y2="205" />

  <text class="small" x="40" y="280">Code calculates the facts, embeddings retrieve the evidence, and the LLM explains the result.</text>
</svg>
